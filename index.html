<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - 経費記録</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        .header {
            background: #06C755;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 18px; font-weight: bold; }
        .header .user-info { font-size: 12px; opacity: 0.9; }
        .nav {
            display: flex;
            background: white;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }
        .nav button {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            min-width: 80px;
        }
        .nav button.active {
            color: #06C755;
            border-bottom-color: #06C755;
            font-weight: bold;
        }
        .container { padding: 16px; max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 15px; color: #666; margin-bottom: 12px; }
        .total-amount {
            font-size: 32px;
            font-weight: bold;
            color: #06C755;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .stat-card .value { font-size: 20px; font-weight: bold; color: #333; }
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-row select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            background: white;
        }
        .record-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .record-item:last-child { border-bottom: none; }
        .record-info .store { font-weight: bold; font-size: 14px; }
        .record-info .detail { font-size: 12px; color: #999; margin-top: 2px; }
        .record-amount { font-weight: bold; font-size: 15px; color: #333; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            background: #e8f5e9;
            color: #06C755;
            margin-top: 4px;
        }
        .export-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn-csv { background: #4CAF50; color: white; }
        .btn-excel { background: #217346; color: white; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .page { display: none; }
        .page.active { display: block; }
        .month-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .month-selector button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }
        .month-selector span {
            font-size: 16px;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }
        .login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #f5f5f5;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 360px;
            width: 100%;
        }
        .login-card h1 { font-size: 22px; margin-bottom: 8px; }
        .login-card p { color: #666; margin-bottom: 32px; font-size: 14px; }
        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: #06C755;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover { background: #05b34b; }

        .modal-bg {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background: rgba(0,0,0,0.45);
            padding: 20px;
        }
        
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            max-width: 420px;
            margin: 60px auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .modal-note {
            font-size: 13px;
            color: #777;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        
        .modal-input {
            width: 100%;
            padding: 11px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-save {
            background: #06C755;
            color: white;
        }
        
        .btn-cancel {
            background: #eee;
            color: #555;
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
        } 
    </style>
       
</head>
<body>
    
<!-- ログインページ -->
<div id="loginPage" class="login-page">
    <div class="login-card">
        <h1>📊 経費マイページ</h1>
        <p>LINEアカウントでログインして<br>経費データを確認できます</p>
        <button class="login-btn" onclick="initLiff()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
            </svg>
            LINEでログイン
        </button>
    </div>
</div>

<!-- メインページ -->
<div id="mainPage" style="display:none;">
    <div class="header">
        <h1>📊 経費マイページ</h1>
        <div class="user-info" id="userInfo"></div>
    </div>

    <div class="nav">
        <button class="active" onclick="showPage('home', this)">ホーム</button>
        <button onclick="showPage('records', this)">一覧</button>
        <button onclick="showPage('chart', this)">グラフ</button>
        <button onclick="showPage('export', this)">出力</button>
        <button onclick="showPage('settings', this)">設定</button>
    </div>

    <div class="container">

        <!-- ホーム -->
        <div id="homePage" class="page active">
            <div class="month-selector">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="currentMonthLabel"></span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">今月の合計</div>
                    <div class="value" id="monthTotal">-</div>
                </div>
                <div class="stat-card">
                    <div class="label">今月の件数</div>
                    <div class="value" id="monthCount">-</div>
                </div>
            </div>
            <div class="card">
                <h2>勘定科目別</h2>
                <canvas id="homeChart" height="200"></canvas>
            </div>
            <div class="card">
                <h2>最近の登録</h2>
                <div id="recentList"><div class="loading">読み込み中...</div></div>
            </div>
        </div>

        <!-- 一覧 -->
        <div id="recordsPage" class="page">
            <div class="filters">
                <!-- フリーワード -->
                <input
                    type="text"
                    id="filterKeyword"
                    placeholder="フリーワード"
                    oninput="loadRecords()">
            
                <!-- 年 -->
                <select id="filterYear"onchange="loadRecords()">
                    <option value="">年</option>
                </select>
            
                <!-- 月 -->
                <select id="filterMonth2"onchange="loadRecords()">
                    <option value="">月</option>
                </select>
            
                <!-- 日 -->
                <select id="filterDay"onchange="loadRecords()">
                    <option value="">日</option>
                </select>
            
                <!-- 支払先 -->
                <input
                    type="text"
                    id="filterStore"
                    placeholder="支払先"
                    oninput="loadRecords()">
            
                <!-- 内容 -->
                <input
                    type="text"
                    id="filterItem"
                    placeholder="内容"
                    oninput="loadRecords()">
            
                <!-- 金額 -->
                <input
                    type="number"
                    id="filterAmount"
                    placeholder="金額"
                    oninput="loadRecords()">
            
                <!-- 既存 -->
                 <select id="filterAccount" onchange="loadRecords()">
                    <option value="">すべての科目</option>
                </select>
                
                <!-- ボタン -->
                <button
                    onclick="resetFilters()"
                    style="
                        background:#f44336;
                        color:white;
                        border:none;
                        border-radius:8px;
                        padding:8px 16px;
                        cursor:pointer;
                    ">
                    検索条件をクリア
                </button>
                </div>
                <div class="card">
                    <div id="recordsList">
                        <div class="loading">
                            読み込み中...
                        </div>
                    </div>
                </div>
                
                </div>

        <!-- グラフ -->
        <div id="chartPage" class="page">
            <div class="card">
                <h2>月別合計推移</h2>
                <canvas id="monthlyChart" height="200"></canvas>
            </div>
            <div class="card">
                <h2>勘定科目別内訳</h2>
                <canvas id="accountChart" height="200"></canvas>
            </div>
        </div>

        <!-- 出力 -->
        <div id="exportPage" class="page">
            <div class="card">
                <h2>データ出力</h2>
                <div class="filter-row">
                    <select id="exportMonth">
                        <option value="">すべての月</option>
                    </select>
                </div>
                <button class="export-btn btn-csv" onclick="exportCSV()">
                    📄 CSVダウンロード
                </button>
                <button class="export-btn btn-excel" onclick="exportExcel()">
                    📊 Excelダウンロード
                </button>
            </div>
        </div>

        <!-- 設定 -->
        <div id="settingsPage" class="page">
        
            <div class="card">
                <h2>プラン</h2>
                <p id="planInfo" style="font-size:14px; margin-bottom:12px;"></p>
        
                <button
                    id="upgradeBtn"
                    onclick="upgradePlan()"
                    style="
                        width:100%;
                        padding:12px;
                        background:#FF6B35;
                        color:white;
                        border:none;
                        border-radius:10px;
                        font-size:15px;
                        font-weight:bold;
                        cursor:pointer;
                        display:none;
                    ">
                    有料プランにアップグレード（月額980円）
                </button>
            </div>
        
            <div class="card">
                <h2>ログアウト</h2>
                <button
                    onclick="logout()"
                    style="
                        width:100%;
                        padding:12px;
                        background:#f5f5f5;
                        color:#666;
                        border:none;
                        border-radius:10px;
                        font-size:15px;
                        cursor:pointer;
                    ">
                    ログアウト
                </button>
            </div>
        
        </div>

    </div>
</div>

<!-- 修正モーダル -->
<div id="editModal" class="modal-bg">
    <div class="modal-box">
        <div class="modal-title">修正内容を入力してください</div>
        <div class="modal-note">
            修正しない項目はそのままでOKです。<br>
            変更したい項目だけ書き換えて「保存する」を押してください。
        </div>

        <input id="editDate" class="modal-input" placeholder="日付">
        <input id="editStore" class="modal-input" placeholder="支払先">
        <input id="editItem" class="modal-input" placeholder="内容">
        <input id="editAmount" class="modal-input" placeholder="金額">
        <input id="editAccount" class="modal-input" placeholder="勘定科目">
        <input id="editPayment" class="modal-input" placeholder="支払方法">

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
            <button class="btn-save" onclick="saveEditRecord()">保存する</button>
        </div>
    </div>
</div>

<!-- 削除モーダル -->
<div id="deleteModal" class="modal-bg">
    <div class="modal-box">
        <div class="modal-title">このデータを削除しますか？</div>
        <div class="modal-note">
            削除すると一覧から消えます。<br>
            削除前の内容はバックアップとしてDBに保存されます。
        </div>

        <div id="deleteRecordText" style="font-size:14px; line-height:1.8; margin-bottom:16px;"></div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeDeleteModal()">キャンセル</button>
            <button class="btn-delete" onclick="confirmDeleteRecord()">削除する</button>
        </div>
    </div>
</div>

<script>
    
    // ===== Supabase設定 =====
    const SUPABASE_URL = 'https://ewmxcvyrfqdhujcldrca.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_p4BmWWdsN6bQ-0zjozrnNQ_IjUBJSeo'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let currentUser = null
    let allRecords = []
    let editingRecordId = null
    let deletingRecordId = null
    let currentMonth = new Date()
    let homeChartInstance = null
    let monthlyChartInstance = null
    let accountChartInstance = null
    
    // 日付を YYYY-MM に統一
    function normalizeMonth(dateStr) {
        if (!dateStr) return ''
        return dateStr.replace(/\//g, '-').substring(0, 7)
    }

    // ===== LIFF 初期化 =====
    const LIFF_ID = '2010043850-PaxG9LLM'
    
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID })
    
            if (!liff.isLoggedIn()) {
                liff.login()
                return
            }
    
            const profile = await liff.getProfile()
            currentUser = {
                userId: profile.userId,
                name: profile.displayName,
                pictureUrl: profile.pictureUrl
            }
            
            localStorage.setItem(
                'line_user',
                JSON.stringify(currentUser)
            )
            
            // ===== login_logs 保存 =====
            await saveLoginLog()
            
            showMain()
    
        } catch (err) {
            console.error(err)
            alert('LIFF初期化失敗')
        }
    }
    
    // ===== login_logs 保存 =====
    async function saveLoginLog() {
    
        try {
    
            const deviceType =
                liff.isInClient()
                ? "LINE"
                : "WEB"
            await db

                .from("login_logs")
                .insert([{    
                    user_id:
                        currentUser.userId,      
                    login_type:
                        "LIFF",     
                    device_type:
                        deviceType,           
                    ip_address:
                        null,      
                    user_agent:
                        navigator.userAgent
            
                }])
    
        } catch (e) {
    
            console.log(
                "login_logs保存失敗",
                e
            )
    
        }
    
    }
    
    // ===== メインページ表示 =====
    async function showMain() {
        document.getElementById('loginPage').style.display = 'none'
        document.getElementById('mainPage').style.display = 'block'
        document.getElementById('userInfo').innerHTML = `
            <div style="display:flex; align-items:center; gap:8px;">
                <img
                    src="${currentUser.pictureUrl || ''}"
                    style="width:32px; height:32px; border-radius:50%;"
                >
                <span>${currentUser.name}</span>
            </div>
        `
        await loadAllData()
        updateMonthLabel()
        await loadHomeData()
        await loadSettings()
    }

    // ===== 全データ読み込み =====
    async function loadAllData() {
        const { data, error } = await db
            .from('records')
            .select('*')
            .eq('user_id', currentUser.userId)
            .order('date', { ascending: false })

        if (error) {
            console.error(error)
            return
        }
        allRecords = data || []
        console.log(allRecords)
        
        // if (allRecords.length > 0) {
        //     currentMonth = new Date(allRecords[0].date)
        // }
        
        setupFilters()
    }

    // ===== フィルター設定 =====
    function setupFilters() {
        const months = [...new Set(
            allRecords.map(r => normalizeMonth(r.date)).filter(Boolean)
        )].sort().reverse()
        const accounts = [...new Set(allRecords.map(r => r.account).filter(Boolean))]

        // const filterMonth = document.getElementById('filterMonth')
        const exportMonth = document.getElementById('exportMonth')
        // filterMonth.innerHTML = '<option value="">すべての月</option>'
        exportMonth.innerHTML = '<option value="">すべての月</option>'

        months.forEach(m => {
            const label = m.replace('-', '年') + '月'
            // filterMonth.innerHTML += `<option value="${m}">${label}</option>`
            exportMonth.innerHTML += `<option value="${m}">${label}</option>`
        })

        const filterAccount = document.getElementById('filterAccount')
        filterAccount.innerHTML = '<option value="">すべての科目</option>'
        accounts.forEach(a => {
            filterAccount.innerHTML += `<option value="${a}">${a}</option>`
        })
        const filterYear =
        document.getElementById('filterYear')
        
        filterYear.innerHTML =
        '<option value="">年</option>'
        
        for(let y = 2023; y <= 2030; y++){
        
            filterYear.innerHTML +=
            `<option value="${y}">${y}年</option>`
        }
        const filterMonth2 =
        document.getElementById('filterMonth2')
        
        filterMonth2.innerHTML =
        '<option value="">月</option>'
        
        for(let m=1; m<=12; m++){
        
            filterMonth2.innerHTML +=
            `<option value="${m}">
                ${m}月
             </option>`
        }
        const filterDay =
        document.getElementById('filterDay')
        
        filterDay.innerHTML =
        '<option value="">日</option>'
        
        for(let d=1; d<=31; d++){
        
            filterDay.innerHTML +=
            `<option value="${d}">
                ${d}日
             </option>`
        }
    }

    // ===== ホームデータ読み込み =====
    async function loadHomeData() {
        const year = currentMonth.getFullYear()
        const month = String(currentMonth.getMonth() + 1).padStart(2, '0')
        const monthStr = `${year}-${month}`
        const monthRecords = allRecords.filter(r => r.date?.startsWith(monthStr))
        // const monthRecords = allRecords.filter(r => {
        //     if (!r.date) return false
        
        //     const normalized = r.date.replace(/\//g, '-')
        //     return normalized.startsWith(monthStr)
        // })
        const total = monthRecords.reduce((sum, r) => sum + (r.amount || 0), 0)

        document.getElementById('monthTotal').textContent = `${total.toLocaleString()}円`
        document.getElementById('monthCount').textContent = `${monthRecords.length}件`

        // 勘定科目別集計
        const accountTotals = {}
        monthRecords.forEach(r => {
            if (r.account) {
                accountTotals[r.account] = (accountTotals[r.account] || 0) + (r.amount || 0)
            }
        })

        // ホームチャート
        if (homeChartInstance) homeChartInstance.destroy()
        const ctx = document.getElementById('homeChart').getContext('2d')
        homeChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: Object.keys(accountTotals),
                datasets: [{
                    data: Object.values(accountTotals),
                    backgroundColor: [
                        '#06C755', '#4CAF50', '#8BC34A', '#CDDC39',
                        '#FFC107', '#FF9800', '#FF5722', '#F44336',
                        '#E91E63', '#9C27B0', '#673AB7', '#3F51B5'
                    ]
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
            }
        })

        // 最近の登録
        const recent = monthRecords.slice(0, 5)
        const recentList = document.getElementById('recentList')
        if (recent.length === 0) {
            recentList.innerHTML = '<p style="color:#999; text-align:center; padding:20px;">データがありません</p>'
            return
        }
        recentList.innerHTML = recent.map(r => `
            <div class="record-item">
                <div class="record-info">
                    <div class="store">${r.store || '-'}</div>
                    <div class="detail">${r.date || ''} | ${r.item || ''}</div>
                    <span class="badge">${r.account || ''}</span>
                </div>
                <div class="record-amount">${(r.amount || 0).toLocaleString()}円</div>
            </div>
        `).join('')
    }

    // ===== 月変更 =====
    function changeMonth(delta) {
        currentMonth.setMonth(currentMonth.getMonth() + delta)
        updateMonthLabel()
        loadHomeData()
    }

    function updateMonthLabel() {
        const year = currentMonth.getFullYear()
        const month = currentMonth.getMonth() + 1
        document.getElementById('currentMonthLabel').textContent = `${year}年${month}月`
    }


    // ===== 一覧読み込み =====
    async function loadRecords() {
        // const monthFilter = document.getElementById('filterMonth').value
        const accountFilter = document.getElementById('filterAccount').value
        const keyword =
        (
            document.getElementById(
                'filterKeyword'
            )?.value || ''
        ).toLowerCase()
        
        const year =
        document.getElementById(
            'filterYear'
        )?.value || ''
        
        const month2 =
        document.getElementById(
            'filterMonth2'
        )?.value || ''
        
        const day =
        document.getElementById(
            'filterDay'
        )?.value || ''
        
        const store =
        (
            document.getElementById(
                'filterStore'
            )?.value || ''
        ).toLowerCase()
        
        const item =
        (
            document.getElementById(
                'filterItem'
            )?.value || ''
        ).toLowerCase()
        
        const amount =
        document.getElementById(
            'filterAmount'
        )?.value || ''

        let filtered = allRecords
        // if (monthFilter) filtered = filtered.filter(r => r.date?.startsWith(monthFilter))
        if (accountFilter) filtered = filtered.filter(r => r.account === accountFilter)
        // フリーワード
        if (keyword) {
        
            filtered = filtered.filter(r =>
        
                (r.store || '')
                    .toLowerCase()
                    .includes(keyword)
        
                ||
        
                (r.item || '')
                    .toLowerCase()
                    .includes(keyword)
        
                ||
        
                (r.account || '')
                    .toLowerCase()
                    .includes(keyword)
        
                ||
        
                String(r.amount || '')
                    .includes(keyword)
            )
        }
        
        // 年
        if (year) {
        
            filtered = filtered.filter(r =>
        
                (r.date || '')
                    .startsWith(year)
            )
        }
        
        // 月
        if (month2) {
        
            filtered = filtered.filter(r => {
        
                const d =
                    (r.date || '')
                    .replace(/\//g, '-')
        
                return d.split('-')[1]
                    === month2.padStart(2, '0')
            })
        }
        
        // 日
        if (day) {
        
            filtered = filtered.filter(r => {
        
                const d =
                    (r.date || '')
                    .replace(/\//g, '-')
        
                return d.split('-')[2]
                    === day.padStart(2, '0')
            })
        }
        
        // 支払先
        if (store) {
        
            filtered = filtered.filter(r =>
        
                (r.store || '')
                    .toLowerCase()
                    .includes(store)
            )
        }
        
        // 内容
        if (item) {
        
            filtered = filtered.filter(r =>
        
                (r.item || '')
                    .toLowerCase()
                    .includes(item)
            )
        }
        
        // 金額
        if (amount) {
        
            filtered = filtered.filter(r =>
        
                String(r.amount || '')
                    === amount
            )
        }
        const list = document.getElementById('recordsList')
        if (filtered.length === 0) {
            list.innerHTML = '<p style="color:#999; text-align:center; padding:20px;">データがありません</p>'
            return
        }

        list.innerHTML = filtered.map(r => `
            <div class="record-item">
                <div class="record-info">
                    <div class="store">${r.store || '-'}</div>
                    <div class="detail">${r.date || ''} | ${r.item || ''} | ${r.payment || ''}</div>
                    <span class="badge">${r.account || ''}</span>
        
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button onclick="openEditRecord('${String(r.id)}')"
                            style="flex:1; padding:8px; border:none; border-radius:8px; background:#06C755; color:white; font-weight:bold;">
                            修正
                        </button>
        
                        <button onclick="deleteRecordFromPage('${String(r.id)}')"
                            style="flex:1; padding:8px; border:none; border-radius:8px; background:#f44336; color:white; font-weight:bold;">
                            削除
                        </button>
                    </div>
                </div>
        
                <div class="record-amount">${(r.amount || 0).toLocaleString()}円</div>
            </div>
        `).join('')
    }

    function resetFilters() {

        document.getElementById(
            "filterKeyword"
        ).value = ""
    
        document.getElementById(
            "filterYear"
        ).value = ""
    
        document.getElementById(
            "filterMonth2"
        ).value = ""
    
        document.getElementById(
            "filterDay"
        ).value = ""
    
        document.getElementById(
            "filterStore"
        ).value = ""
    
        document.getElementById(
            "filterItem"
        ).value = ""
    
        document.getElementById(
            "filterAmount"
        ).value = ""
    
        document.getElementById(
            "filterAccount"
        ).value = ""
    
        loadRecords()
    
    }
    // ===== グラフ読み込み =====
    async function loadCharts() {
        // 月別推移
        const monthlyData = {}
        allRecords.forEach(r => {
            const m = normalizeMonth(r.date)
            if (m) monthlyData[m] = (monthlyData[m] || 0) + (r.amount || 0)
        })
        const sortedMonths = Object.keys(monthlyData).sort()

        if (monthlyChartInstance) monthlyChartInstance.destroy()
        const ctx1 = document.getElementById('monthlyChart').getContext('2d')
        monthlyChartInstance = new Chart(ctx1, {
            type: 'bar',
            data: {
                labels: sortedMonths.map(m => m.replace('-', '年') + '月'),
                datasets: [{
                    label: '合計金額',
                    data: sortedMonths.map(m => monthlyData[m]),
                    backgroundColor: '#06C755'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        })

        // 勘定科目別
        const accountData = {}
        allRecords.forEach(r => {
            if (r.account) accountData[r.account] = (accountData[r.account] || 0) + (r.amount || 0)
        })

        if (accountChartInstance) accountChartInstance.destroy()
        const ctx2 = document.getElementById('accountChart').getContext('2d')
        accountChartInstance = new Chart(ctx2, {
            type: 'pie',
            data: {
                labels: Object.keys(accountData),
                datasets: [{
                    data: Object.values(accountData),
                    backgroundColor: [
                        '#06C755', '#4CAF50', '#8BC34A', '#CDDC39',
                        '#FFC107', '#FF9800', '#FF5722', '#F44336',
                        '#E91E63', '#9C27B0', '#673AB7', '#3F51B5'
                    ]
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
            }
        })
    }

    // ===== CSV出力 =====
    function exportCSV() {
        const monthFilter = document.getElementById('exportMonth').value
        let filtered = allRecords
        if (monthFilter) {
            filtered = filtered.filter(r =>
                normalizeMonth(r.date) === monthFilter
            )
        }

        const header = '日付,支払先,内容,金額,勘定科目,支払方法\n'
        const rows = filtered.map(r =>
            `${r.date || ''},${r.store || ''},${r.item || ''},${r.amount || 0},${r.account || ''},${r.payment || ''}`
        ).join('\n')

        const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = `経費_${monthFilter || '全期間'}.csv`
        a.click()
    }

    // ===== Excel出力 =====
    function exportExcel() {
        const monthFilter = document.getElementById('exportMonth').value
        let filtered = allRecords
        if (monthFilter) {
            filtered = filtered.filter(r =>
                normalizeMonth(r.date) === monthFilter
            )
        }

        let html = '<table><tr><th>日付</th><th>支払先</th><th>内容</th><th>金額</th><th>勘定科目</th><th>支払方法</th></tr>'
        filtered.forEach(r => {
            html += `<tr><td>${r.date || ''}</td><td>${r.store || ''}</td><td>${r.item || ''}</td><td>${r.amount || 0}</td><td>${r.account || ''}</td><td>${r.payment || ''}</td></tr>`
        })
        html += '</table>'

        const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        a.download = `経費_${monthFilter || '全期間'}.xls`
        a.click()
    }

    // ===== 設定読み込み =====
    async function loadSettings() {
    
        const { data, error } = await db
            .from('users')
            .select('*')
            .eq('user_id', currentUser.userId)
            .single()
    
        if (error) {
            console.error(error)
            return
        }
    
        if (!data) return
    
        const planInfo = document.getElementById('planInfo')
        const upgradeBtn = document.getElementById('upgradeBtn')
    
        if (data.plan === 'free') {
    
            planInfo.textContent =
                `無料プラン（今月${data.monthly_count || 0}/30件使用）`
    
            upgradeBtn.style.display = 'block'
    
        } else {
    
            planInfo.textContent = '有料プラン（無制限）'
    
            upgradeBtn.style.display = 'none'
        }
    }

    function upgradePlan() {
        alert('Stripe決済は準備中です')
    }

    // ===== ログアウト =====
    function logout() {
        localStorage.removeItem('line_user')
        localStorage.removeItem('line_state')
        currentUser = null
        document.getElementById('mainPage').style.display = 'none'
        document.getElementById('loginPage').style.display = 'flex'
    }

    // ===== ページ切り替え =====
    function showPage(page, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'))
        document.getElementById(page + 'Page').classList.add('active')
        btn.classList.add('active')

        if (page === 'records') loadRecords()
        if (page === 'chart') loadCharts()
    }

    // ===== マイページ：修正モーダルを開く =====
    async function openEditRecord(recordId) {
    
        const record = allRecords.find(r => String(r.id) === String(recordId))
    
        if (!record) {
            alert('対象データが見つかりません')
            return
        }
    
        editingRecordId = recordId
    
        document.getElementById('editDate').value = record.date || ''
        document.getElementById('editStore').value = record.store || ''
        document.getElementById('editItem').value = record.item || ''
        document.getElementById('editAmount').value = record.amount || ''
        document.getElementById('editAccount').value = record.account || ''
        document.getElementById('editPayment').value = record.payment || ''
    
        document.getElementById('editModal').style.display = 'block'
    }
    
    
    // ===== 修正モーダルを閉じる =====
    function closeEditModal() {
        editingRecordId = null
        document.getElementById('editModal').style.display = 'none'
    }
    
    
    // ===== マイページ：修正保存 =====
    async function saveEditRecord() {
    
        const record = allRecords.find(r => String(r.id) === String(editingRecordId))
    
        if (!record) {
            alert('対象データが見つかりません')
            return
        }
    
        const beforeData = { ...record }
    
        const updated = {
            date: document.getElementById('editDate').value,
            store: document.getElementById('editStore').value,
            item: document.getElementById('editItem').value,
            amount: Number(String(document.getElementById('editAmount').value).replace(/[^\d]/g, '')),
            account: document.getElementById('editAccount').value,
            payment: document.getElementById('editPayment').value
        }
    
        const { error } = await db
            .from('records')
            .update(updated)
            .eq('id', editingRecordId)
            .eq('user_id', currentUser.userId)
    
        if (error) {
            console.error(error)
            alert('修正に失敗しました')
            return
        }
    
        await db
            .from('record_logs')
            .insert([{
                user_id: currentUser.userId,
                record_id: editingRecordId,
                action: 'mypage_update',
                before_data: beforeData,
                after_data: updated,
                source: 'LIFF',
                memo: 'マイページから修正'
            }])
    
        closeEditModal()
    
        alert('修正しました')
    
        await loadAllData()
        loadRecords()
        loadHomeData()
    }

    // ===== マイページ：削除モーダルを開く =====
    async function deleteRecordFromPage(recordId) {
    
        const record = allRecords.find(r => String(r.id) === String(recordId))
    
        if (!record) {
            alert('対象データが見つかりません')
            return
        }
    
        deletingRecordId = recordId
    
        document.getElementById('deleteRecordText').innerHTML = `
            日付：${record.date || ''}<br>
            支払先：${record.store || ''}<br>
            内容：${record.item || ''}<br>
            金額：${Number(record.amount || 0).toLocaleString()}円<br>
            勘定科目：${record.account || ''}<br>
            支払方法：${record.payment || ''}
        `
    
        document.getElementById('deleteModal').style.display = 'block'
    }
    
    
    // ===== 削除モーダルを閉じる =====
    function closeDeleteModal() {
        deletingRecordId = null
        document.getElementById('deleteModal').style.display = 'none'
    }
    
    
    // ===== マイページ：削除確定 =====
    async function confirmDeleteRecord() {
    
        const record = allRecords.find(r => String(r.id) === String(deletingRecordId))
    
        if (!record) {
            alert('対象データが見つかりません')
            return
        }
    
        await db
            .from('deleted_records')
            .insert([{
                original_record_id: record.id,
                user_id: currentUser.userId,
                date: record.date,
                store: record.store,
                item: record.item,
                amount: record.amount,
                account: record.account,
                payment: record.payment,
                deleted_from: 'LIFF'
            }])
    
        await db
            .from('record_logs')
            .insert([{
                user_id: currentUser.userId,
                record_id: record.id,
                action: 'mypage_delete',
                before_data: record,
                after_data: null,
                source: 'LIFF',
                memo: 'マイページから削除'
            }])
    
        const { error } = await db
            .from('records')
            .delete()
            .eq('id', deletingRecordId)
            .eq('user_id', currentUser.userId)
    
        if (error) {
            console.error(error)
            alert('削除に失敗しました')
            return
        }
    
        closeDeleteModal()
    
        alert('削除しました')
    
        await loadAllData()
        loadRecords()
        loadHomeData()
    }

    // ===== 初期化 =====
    initLiff()
</script>
